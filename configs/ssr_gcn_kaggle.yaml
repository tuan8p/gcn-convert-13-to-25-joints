dataset:
  npy_merged_path: /kaggle/input/datasets/tuan8p/ear-anticipation-dataset # ../data/processed/npy_merged
  train_ratio: 0.7
  val_ratio: 0.2
  test_ratio: 0.1
  stratified_subject_split: true

preprocessing:
  fixed_len: 150

augmentation:
  enabled: true
  rotation_deg: 10.0
  jitter_std: 0.005

model:
  hidden_channels: 96
  num_blocks: 6
  temporal_kernel: 9
  dropout: 0.1

loss:
  joint_weight: 1.0
  bone_weight: 0.1

training:
  per_gpu_batch_size: 8
  val_per_gpu_batch_size: 16
  epochs: 50
  lr: 0.001
  min_lr: 0.00001
  weight_decay: 0.0001
  scheduler: cosine
  lr_decay: 0.98
  num_workers: 4
  pin_memory: true
  persistent_workers: true
  use_amp: true
  amp_dtype: float16
  compile: false
  compile_mode: default
  grad_clip: 1.0

ddp:
  backend: nccl

experiment:
  seed: 42
  early_stopping: false
  early_stopping_patience: 10
  output_dir: outputs/ssr_gcn
  # Fraction of train/val/test metadata rows to keep (1.0 = all). CLI --subset-ratio overrides.
  subset_ratio: 1.0

wandb:
  enabled: false
  project: DACN-SSR
  entity: tuan8p
  run_name: ssr_gcn_etri_elderly
  tags: [ssr, gcn, etri_elderly, kaggle, 2xt4]

runtime:
  profile: t4

runtime_profile:
  t4:
    training:
      per_gpu_batch_size: 8
      val_per_gpu_batch_size: 16
      num_workers: 4
      use_amp: true
      amp_dtype: float16
      compile: false
  local_debug:
    training:
      per_gpu_batch_size: 2
      val_per_gpu_batch_size: 2
      num_workers: 0
      persistent_workers: false
      epochs: 2
      compile: false
