dataset:
  npy_merged_path: /kaggle/input/datasets/tuan8p/etri-elderly-toyota13 # ../data/processed/npy_merged
  train_ratio: 0.7
  val_ratio: 0.2
  test_ratio: 0.1
  stratified_subject_split: true

preprocessing:
  fixed_len: 150

augmentation:
  enabled: true
  rotation_deg: 15.0   # tăng nhẹ để model học robust hơn với missing extremity joints
  jitter_std: 0.008

model:
  hidden_channels: 128  # tăng từ 96 để có capacity học missing joints tốt hơn
  num_blocks: 8         # tăng từ 6 để stack GCN sâu hơn
  temporal_kernel: 9
  dropout: 0.1

loss:
  joint_weight: 1.0
  bone_weight: 0.3      # tăng từ 0.1 để penalize sai lệch tỷ lệ cơ thể mạnh hơn (đặc biệt foot joints)

training:
  per_gpu_batch_size: 128
  val_per_gpu_batch_size: 256
  epochs: 100           # tăng từ 50 vì run trước best ở epoch 50 (cuối) — chưa hội tụ
  lr: 0.001
  min_lr: 0.000005      # giảm floor để cosine decay có dải rộng hơn ở 100 epoch
  weight_decay: 0.0001
  scheduler: cosine
  lr_decay: 0.98
  num_workers: 4
  pin_memory: true
  persistent_workers: true
  use_amp: true
  amp_dtype: float16
  compile: false
  compile_mode: default
  grad_clip: 1.0

ddp:
  backend: nccl

experiment:
  seed: 42
  early_stopping: true  # bật vì train dài hơn, tránh lãng phí compute nếu hội tụ sớm
  early_stopping_patience: 15
  output_dir: outputs/ssr_gcn
  subset_ratio: 1.0

wandb:
  enabled: true
  project: DACN-SSR
  entity: tuan8p
  run_name: ssr_gcn_etri_elderly
  tags: [ssr, gcn, etri_elderly, kaggle, 2xt4]

runtime:
  profile: t4

runtime_profile:
  t4:
    training:
      per_gpu_batch_size: 128
      val_per_gpu_batch_size: 256
      num_workers: 4
      use_amp: true
      amp_dtype: float16
      compile: false
  local_debug:
    training:
      per_gpu_batch_size: 2
      val_per_gpu_batch_size: 2
      num_workers: 0
      persistent_workers: false
      epochs: 2
      compile: false
